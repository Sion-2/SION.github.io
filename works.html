<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close">🔙</span>

    <div class="modal-images">

<!-- ▼ ロゴオーバーレイ（headerの下に置く） -->
<div id="logo-overlay">
  <img src="images/オープン.png" alt="Logo" id="logo">
</div>



  <script>
  const logoOverlay = document.getElementById('logo-overlay');
  const logo = document.getElementById('logo');

  logo.addEventListener('click', () => {
    logoOverlay.classList.add('fade-out');
    setTimeout(() => {
      logoOverlay.style.display = 'none';
    }, 600);
  });
</script>

<script>
document.querySelectorAll(".rowcard").forEach(rowcard => {
  rowcard.addEventListener("click", function () {

    const frontSrc = this.querySelector(".worksfront img").src;
    const backSrc  = this.querySelector(".worksback img").src;

    document.getElementById("modal-img-left").src = frontSrc;
    document.getElementById("modal-img-right").src = backSrc;

    document.getElementById("modal").style.display = "block";
  });
});

document.querySelector(".close").addEventListener("click", function () {
  document.getElementById("modal").style.display = "none";
});

</script>
